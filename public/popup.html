<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>划词翻译助手</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-root">

    <!-- Header -->
    <header class="popup-header">
      <span class="header-icon">
        <!-- Lucide Globe -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
          <path d="M2 12h20"/>
        </svg>
      </span>
      <span class="popup-title">划词中英互译助手</span>
    </header>

    <!-- Body -->
    <div class="popup-body">

      <!-- Stats Card -->
      <div class="card animate-fade-in">
        <div class="card-header">
          <span class="card-icon">
            <!-- Lucide BarChart3 -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"/>
              <path d="M18 17V9"/>
              <path d="M13 17V5"/>
              <path d="M8 17v-3"/>
            </svg>
          </span>
          <span class="card-title">翻译统计</span>
        </div>
        <div class="stats-grid">
          <div class="stat-cell">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">今日翻译</div>
          </div>
          <div class="stat-cell">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">累计翻译</div>
          </div>
        </div>
      </div>

      <!-- Settings Card -->
      <div class="card animate-fade-in">
        <div class="setting-row">
          <div class="setting-info">
            <span class="setting-label">自动翻译</span>
            <span class="setting-desc">划选文本时自动弹出翻译</span>
          </div>
          <label class="switch-root">
            <input type="checkbox" id="autoTranslate" checked>
            <span class="switch-track">
              <span class="switch-knob"></span>
            </span>
          </label>
        </div>
      </div>

      <!-- Usage Hints Card -->
      <div class="card animate-fade-in">
        <div class="hints-row">
          <div class="hint-item">
            <span class="hint-icon">
              <!-- Lucide MousePointer2 -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z"/>
              </svg>
            </span>
            <span>划选文本</span>
          </div>
          <div class="hint-item">
            <span class="hint-icon">
              <!-- Lucide Languages -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m5 8 6 6"/>
                <path d="m4 14 6-6 2-3"/>
                <path d="M2 5h12"/>
                <path d="M7 2h1"/>
                <path d="m22 22-5-10-5 10"/>
                <path d="M14 18h6"/>
              </svg>
            </span>
            <span>自动翻译</span>
          </div>
        </div>
      </div>

    </div>

    <!-- Footer -->
    <footer class="popup-footer">
      <button class="btn btn-destructive" id="clearStats">
        <span class="btn-icon">
          <!-- Lucide Trash2 -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"/>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </span>
        清除统计数据
      </button>
    </footer>

  </div>

  <!-- Toast container -->
  <div class="toast" id="toast">
    <span class="toast-icon">
      <!-- Lucide CheckCircle2 -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
    </span>
    <span id="toastMessage"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
