<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>划词翻译助手</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="popup-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063A2 2 0 0 0 14.063 15.5l-1.582 6.135a.5.5 0 0 1-.963 0z"/>
            </svg>
            <h1 class="popup-title">划词翻译助手</h1>
        </div>

        <!-- Content -->
        <div class="popup-content">
            <!-- Features Card -->
            <div class="card">
                <h3 class="card-title">使用说明</h3>
                <ul class="features-list">
                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m9 9 5 12 1.8-5.2L21 14 9 9z"/>
                            <path d="m16.1 16.1 4.2 4.2"/>
                        </svg>
                        <span>划选任意文本</span>
                    </li>
                    <li>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            <line x1="8" y1="10" x2="16" y2="10"/>
                            <line x1="8" y1="14" x2="16" y2="14"/>
                        </svg>
                        <span>自动弹出翻译</span>
                    </li>
                </ul>
            </div>

            <!-- Settings Card -->
            <div class="card">
                <h3 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    设置
                </h3>
                <div class="setting-item">
                    <div class="setting-info">
                        <div class="setting-title">自动翻译</div>
                        <div class="setting-description">划选文本时自动翻译</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="autoTranslate" class="switch-input" checked>
                        <span class="switch-slider"></span>
                    </label>
                </div>
            </div>

            <!-- Stats Card -->
            <div class="card">
                <h3 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3v18h18"/>
                        <path d="M7 16v-3"/>
                        <path d="M11 16v-6"/>
                        <path d="M15 16V8"/>
                        <path d="M19 16v-2"/>
                    </svg>
                    翻译统计
                </h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="todayCount">0</div>
                        <div class="stat-label">今日</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="totalCount">0</div>
                        <div class="stat-label">总计</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="popup-footer">
            <button class="btn btn-destructive" id="clearStats">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18"/>
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                </svg>
                清除统计
            </button>
        </div>
    </div>

    <script src="dist/popup.js"></script>
</body>
</html>
