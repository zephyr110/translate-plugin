<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>划词翻译助手</title>
    <link rel="stylesheet" href="popup.css">
    
</head>
<body>
    <div class="popup-container">
        <!-- Material Design 3 风格头部 -->
        <div class="popup-header">
            <img src="icons/icon128.png" alt="Logo" class="popup-logo">
            <h1 class="popup-title">划词中英互译助手</h1>
        </div>
        
        <!-- Ant Design 内容区 -->
        <div class="popup-content">
            <!-- 功能卡片 -->
            <div class="features-card">
                <h3 class="card-title">使用说明</h3>
                <ul class="features-list">
                    <li><span class="feature-icon">✂️</span><span>划选任意文本</span></li>
                    <li><span class="feature-icon">💬</span><span>自动弹出翻译</span></li>
                </ul>
            </div>
            
            <!-- 设置卡片 -->
            <div class="settings-card">
                <div class="card-header">
                    <h3 class="card-title">设置</h3>
                </div>
                <div class="card-content">
                    <div class="setting-item">
                        <div class="setting-info">
                            <span class="setting-title">自动翻译</span>
                            <span class="setting-description">划选文本时自动翻译</span>
                        </div>
                        <div class="switch-container">
                            <input type="checkbox" id="autoTranslate" class="switch-input" checked>
                            <label for="autoTranslate" class="switch-label"></label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 统计卡片 -->
            <div class="stats-card">
                <div class="card-header">
                    <h3 class="card-title">翻译统计</h3>
                </div>
                <div class="card-content">
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value" id="todayCount">0</div>
                            <div class="stat-label">今日</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="totalCount">0</div>
                            <div class="stat-label">总计</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Ant Design 底部 -->
        <div class="popup-footer">
            <button class="clear-btn" id="clearStats">清除统计</button>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
